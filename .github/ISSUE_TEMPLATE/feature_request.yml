name: Feature request
description: Propose a product, transport, Agent, or source integration improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe the user flow and expected behavior.
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Privacy and security boundary
      description: Explain where data is read, transported, stored, decrypted, and exposed to an Agent or model provider.
    validations:
      required: true
  - type: checkboxes
    id: principles
    attributes:
      label: Project principles
      options:
        - label: The generic MCP path remains available.
          required: true
        - label: The proposal does not require medical diagnosis or unsupported health claims.
          required: true

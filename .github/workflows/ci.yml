name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Typecheck workspaces
        run: npm run typecheck

      - name: Test local runtime
        run: npm run test:local

      - name: Build local runtime
        run: npm run build:local

      - name: Build website
        run: npm run build:www

      - name: Scan release scope for secrets
        run: npm run audit:secrets

      - name: Audit production runtime dependencies
        run: npm run audit:dependencies

      - name: Verify npm package contents
        run: npm run pack:check --workspace healthlink-local

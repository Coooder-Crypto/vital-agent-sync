name: HealthLink
options:
  bundleIdPrefix: com.vitalmcp
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.2.0"
    DEVELOPMENT_TEAM: ""
targets:
  HealthLink:
    type: application
    platform: iOS
    sources:
      - App
      - path: Resources
        buildPhase: resources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Vital Agent
        CFBundleName: Vital Agent
        CFBundleShortVersionString: $(MARKETING_VERSION)
        LSRequiresIPhoneOS: true
        NSHealthShareUsageDescription: Vital Agent Sync reads selected Apple Health data to sync daily summaries to your authorized agent server.
        NSCameraUsageDescription: Vital Agent Sync scans pairing QR codes shown by your local Agent server.
        NSLocalNetworkUsageDescription: Vital Agent Sync connects to your local Agent server on your network after you approve pairing.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        BGTaskSchedulerPermittedIdentifiers:
          - com.vitalmcp.ios.autosync
        CFBundleURLTypes:
          - CFBundleURLName: com.vitalmcp.ios
            CFBundleURLSchemes:
              - vitalmcp
              - healthlink
        UILaunchScreen: {}
        UIBackgroundModes:
          - fetch
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: App/HealthLink.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vitalmcp.ios
        PRODUCT_NAME: HealthLink
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "NO"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    scheme:
      testTargets:
        - HealthLinkTests
  HealthLinkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/HealthLinkTests
    dependencies:
      - target: HealthLink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vitalmcp.ios.tests
        GENERATE_INFOPLIST_FILE: "YES"

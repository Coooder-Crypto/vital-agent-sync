name: vital-agent-sync-relay-production

services:
  vital-agent-sync-relay:
    build:
      context: ../..
      dockerfile: deploy/relay/Dockerfile
    image: ${VITALMCP_RELAY_IMAGE:-vital-agent-sync-relay:0.5.0}
    restart: unless-stopped
    init: true
    expose:
      - "8790"
    volumes:
      - vital-agent-sync-relay-data:/data
    environment:
      VITALMCP_RELAY_HOST: 0.0.0.0
      VITALMCP_RELAY_PORT: "8790"
      VITALMCP_RELAY_DB: /data/relay.sqlite
      VITALMCP_RELAY_RETENTION_DAYS: "30"
      VITALMCP_RELAY_MAX_ENVELOPE_BYTES: "524288"
      VITALMCP_RELAY_MAX_UPLOADS_PER_MINUTE: "120"
      VITALMCP_RELAY_MAX_QUEUED_ENVELOPES_PER_USER: "1000"
      VITALMCP_RELAY_MAX_DEVICES_PER_USER: "5"
      VITALMCP_RELAY_TRUST_PROXY: "true"
      VITALMCP_RELAY_API_TOKEN: ${VITALMCP_RELAY_API_TOKEN:?Set a random deployment API token}
      VITALMCP_RELAY_METRICS_TOKEN: ${VITALMCP_RELAY_METRICS_TOKEN:?Set a separate random metrics token}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:8790/v1/status').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    depends_on:
      vital-agent-sync-relay:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      VITALMCP_RELAY_DOMAIN: ${VITALMCP_RELAY_DOMAIN:?Set the public relay DNS name}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  vital-agent-sync-relay-data:
  caddy-data:
  caddy-config:

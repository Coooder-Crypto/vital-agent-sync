services:
  vitalmcp:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: vitalmcp:dev
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./vital-agent-sync-data:/data
    environment:
      VITALMCP_HOST: 0.0.0.0
      VITALMCP_PORT: "8787"
      VITALMCP_DB: /data/vital-agent.sqlite
      VITALMCP_TRANSPORT: lan
      VITALMCP_SERVER_URL: ${VITALMCP_SERVER_URL:?Set this to an iPhone-reachable URL, for example http://192.168.31.53:8787}
